<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TikTok Live Biggest Support Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body class="support-source">
    <main class="support-widget" aria-label="TikTok live biggest support widget">
      <div class="leader-banner" aria-hidden="true">
        <span>New Leader Incoming</span>
      </div>
      <div class="support-kicker">
        <svg class="support-kicker-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 19h18v2H3v-2Zm0-12 5 4 4-7 4 7 5-4-2 10H5L3 7Z"/>
        </svg>
        <span>Biggest Support</span>
      </div>

      <div class="support-pill">
        <div class="support-media">
          <div id="support-avatar" class="support-avatar" aria-hidden="true"></div>
          <div id="gift-icon" class="gift-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M20 7h-3.2c.5-.5.8-1.2.8-2 0-1.7-1.3-3-3-3-1.2 0-2.2.7-2.7 1.7C11.4 2.7 10.4 2 9.2 2c-1.7 0-3 1.3-3 3 0 .8.3 1.5.8 2H4v6h1v8h14v-8h1V7Zm-5.4-3c.6 0 1 .4 1 1s-.4 1-1 1h-1.8c.2-1.1.8-2 1.8-2ZM8.2 5c0-.6.4-1 1-1 1 0 1.6.9 1.8 2H9.2c-.6 0-1-.4-1-1ZM6 9h5v3H6V9Zm1 5h4v5H7v-5Zm10 5h-4v-5h4v5Zm1-7h-5V9h5v3Z"/>
            </svg>
          </div>
        </div>
        <div class="support-copy">
          <strong id="supporter">Waiting...</strong>
          <span id="gift-detail">No gifts yet</span>
        </div>
      </div>
    </main>

    <div id="status" class="status">Starting</div>
    <script src="./script.js"></script>
  </body>
</html>
