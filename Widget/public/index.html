<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TikTok Live Goal Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="widget" aria-label="TikTok live stream goal widget">
      <section class="panel like-panel">
        <div class="scanline"></div>
        <div class="heading">
          <svg class="heading-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 22V10h4l2.1-5.7c.3-.8 1.2-1.3 2-1l.4.1c1.1.4 1.7 1.5 1.4 2.6L16 10h4.1c1.4 0 2.4 1.3 2.1 2.7l-1.4 6.6c-.3 1.6-1.7 2.7-3.3 2.7H7Z"/>
            <path d="M2 10h3v12H2z"/>
          </svg>
          <span>Like Goal</span>
        </div>
        <div class="counter">
          <span id="like-count">0</span>
          <span class="slash">/</span>
          <span id="like-goal">5,000</span>
          <span id="like-percent">(0%)</span>
        </div>
        <div class="bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="like-progress" class="fill"></div>
        </div>
      </section>

      <section class="panel support-panel">
        <div class="scanline"></div>
        <div class="leader-banner" aria-hidden="true">
          <span>New Biggest Supporter</span>
        </div>
        <div class="heading support-heading">
          <svg class="heading-icon crown" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 19h18v2H3v-2Zm0-12 5 4 4-7 4 7 5-4-2 10H5L3 7Z"/>
          </svg>
          <span>Biggest Support</span>
        </div>
        <div class="support-pill">
          <div class="support-media">
            <div id="support-avatar" class="support-avatar" aria-hidden="true"></div>
            <div id="gift-icon" class="gift-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M20 7h-3.2c.5-.5.8-1.2.8-2 0-1.7-1.3-3-3-3-1.2 0-2.2.7-2.7 1.7C11.4 2.7 10.4 2 9.2 2c-1.7 0-3 1.3-3 3 0 .8.3 1.5.8 2H4v6h1v8h14v-8h1V7Zm-5.4-3c.6 0 1 .4 1 1s-.4 1-1 1h-1.8c.2-1.1.8-2 1.8-2ZM8.2 5c0-.6.4-1 1-1 1 0 1.6.9 1.8 2H9.2c-.6 0-1-.4-1-1ZM6 9h5v3H6V9Zm1 5h4v5H7v-5Zm10 5h-4v-5h4v5Zm1-7h-5V9h5v3Z"/>
              </svg>
            </div>
          </div>
          <div class="support-copy">
            <strong id="supporter">Waiting...</strong>
            <span id="gift-detail">No gifts yet</span>
          </div>
        </div>
      </section>
    </main>

    <div id="status" class="status">Starting</div>
    <script src="./script.js"></script>
  </body>
</html>
