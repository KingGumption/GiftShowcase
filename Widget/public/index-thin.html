<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TikTok Live Goal Widget - Thin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body class="thin-source">
    <main class="widget thin-widget" aria-label="Thin TikTok live stream goal widget">
      <section class="panel like-panel">
        <div class="scanline"></div>
        <div class="heading">
          <svg class="heading-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 22V10h4l2.1-5.7c.3-.8 1.2-1.3 2-1l.4.1c1.1.4 1.7 1.5 1.4 2.6L16 10h4.1c1.4 0 2.4 1.3 2.1 2.7l-1.4 6.6c-.3 1.6-1.7 2.7-3.3 2.7H7Z"/>
            <path d="M2 10h3v12H2z"/>
          </svg>
          <span>Like Goal</span>
        </div>
        <div class="goal-track">
          <div class="bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="like-progress" class="fill"></div>
            <div class="counter">
              <span id="like-count">0</span>
            </div>
          </div>
          <div class="goal-target">
            <span id="like-goal">5,000</span>
          </div>
        </div>
        <span id="like-percent" class="thin-percent">(0%)</span>
      </section>

    </main>

    <div id="status" class="status">Starting</div>
    <script src="./script.js"></script>
  </body>
</html>
